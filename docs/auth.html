<!-- views/auth.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QIU Lost & Found</title>
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>
                <img src="https://cdn.eduadvisor.my/institution/qiu/2022/12/ea-inst-logo-qiu-new.webp" 
                     alt="QIU Logo" 
                     class="header-logo"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/80x80/003366/ffffff?text=QIU'">
                Campus Lost & Found
            </h1>
            <nav>
                <ul>
                    <li><a href="./index.html"><i class="bi bi-house"></i> Home</a></li>
                    <li><a href="/add-item.html"><i class="bi bi-plus-circle"></i> Report Item</a></li>
                    <li id="authLinks">
                        <a href="/auth.html" class="active"><i class="bi bi-person"></i> Login</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="form-container" style="max-width: 500px;">
            <!-- Toggle Buttons -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-primary" style="flex: 1;" id="showLoginBtn">Login</button>
                <button class="btn btn-secondary" style="flex: 1;" id="showRegisterBtn">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 20px;">
                    <i class="bi bi-box-arrow-in-right"></i> Login to Your Account
                </h2>
                
                <div class="form-group">
                    <label><i class="bi bi-envelope"></i> Email or Username</label>
                    <input type="text" id="loginUsername" name="loginUsername" class="form-control" placeholder="Enter your email or username" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-lock"></i> Password</label>
                    <input type="password" id="loginPassword" name="loginPassword" class="form-control" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px;">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <!-- Register Form (hidden by default) -->
            <form id="registerForm" style="display: none;">
                <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 20px;">
                    <i class="bi bi-person-plus"></i> Create New Account
                </h2>

                <div class="form-group">
                    <label><i class="bi bi-person"></i> Full Name</label>
                    <input type="text" id="regFullName" name="regFullName" class="form-control" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-card-text"></i> Student ID</label>
                    <input type="text" id="regStudentId" name="regStudentId" class="form-control" placeholder="e.g., S12345" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-person-badge"></i> Username</label>
                    <input type="text" id="regUsername" name="regUsername" class="form-control" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-envelope"></i> Email</label>
                    <input type="email" id="regEmail" name="regEmail" class="form-control" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-lock"></i> Password</label>
                    <input type="password" id="regPassword" name="regPassword" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                </div>

                <div class="form-group">
                    <label><i class="bi bi-lock"></i> Confirm Password</label>
                    <input type="password" id="regConfirmPassword" name="regConfirmPassword" class="form-control" placeholder="Re-enter password" required>
                </div>

                <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px;">
                    <i class="bi bi-person-plus"></i> Register
                </button>
            </form>

            <div id="message" style="margin-top: 20px;"></div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Quest International University - Campus Lost & Found System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Only include main.js - it contains all auth functions -->
    <script src="public/js/main.js"></script>
</body>
</html>
