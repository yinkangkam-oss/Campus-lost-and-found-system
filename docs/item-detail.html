<!-- views/item-detail.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - QIU Lost & Found</title>
    <base href="./">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>
                <img src="https://cdn.eduadvisor.my/institution/qiu/2022/12/ea-inst-logo-qiu-new.webp" 
                     alt="QIU Logo" 
                     class="header-logo"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/80x80/003366/ffffff?text=QIU'">
                Campus Lost & Found
            </h1>
            <nav>
                <ul>
                    <li><a href="./index.html" class="active"><i class="bi bi-house"></i> Home</a></li>
                    <!-- UPDATED: Added onclick login check -->
                    <li><a href="./add-item.html" onclick="return checkLoginBeforeReport(event);"><i class="bi bi-plus-circle"></i> Report Item</a></li>
                    <li id="authLinks">
                        <a href="./auth.html"><i class="bi bi-person"></i> Login</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section>
            <h2 class="section-title">
                <i class="bi bi-info-circle"></i>
                Item Details
            </h2>

            <div id="itemDetail" class="form-container">
                <div class="spinner"></div>
            </div>
        </section>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3><i class="bi bi-exclamation-triangle"></i> Confirm Delete</h3>
            <p>Are you sure you want to delete this item? This action cannot be undone.</p>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Quest International University - Campus Lost & Found System. All rights reserved.</p>
        </div>
    </footer>

    <script src="./main.js"></script>
</body>
</html>
